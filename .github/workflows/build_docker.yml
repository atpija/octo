name: Build Docker Images

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-docker:
    name: Build Docker Images (${{ matrix.name }})
    runs-on: [self-hosted, windows, x64, octo]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: infra
            image: octo-infra
            dockerfile: .github/docker/Dockerfile.octo-infra
          - name: test
            image: octo-test-base
            dockerfile: .github/docker/Dockerfile.octo-test

    env:
      CACHE_ROOT: C:\octo\runner-cache\linux\${{ github.repository }}\${{ github.ref_name }}

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Prepare Docker build context
      # ------------------------------------------------------------
      - name: Prepare Docker build context
        shell: powershell
        run: |
          if (-not (Test-Path $env:CACHE_ROOT)) {
            Write-Error "Cache not found: $env:CACHE_ROOT"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path temp | Out-Null
          Copy-Item "$env:CACHE_ROOT\*.deb" temp -Force -ErrorAction SilentlyContinue

          if (-not (Get-ChildItem temp -Filter *.deb)) {
            Write-Error "No .deb files found"
            exit 1
          }

      # ------------------------------------------------------------
      # Build Image
      # ------------------------------------------------------------
      - name: Build ${{ matrix.image }}
        shell: powershell
        run: |
          docker build `
            --no-cache `
            --pull `
            -f "${{ matrix.dockerfile }}" `
            -t "${{ matrix.image }}" `
            .
