name: Build Docker Test Image

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-docker:
    name: Build Docker Test Image
    runs-on: [self-hosted, windows, x64, octo]

    env:
      CACHE_ROOT: C:\octo\runner-cache\linux\${{ github.repository }}\${{ github.ref_name }}

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Prepare Docker build context
      # ------------------------------------------------------------
      - name: Prepare Docker build context
        shell: powershell
        run: |
          if (-not (Test-Path $env:CACHE_ROOT)) {
            Write-Error "Cache not found: $env:CACHE_ROOT"
            exit 1
          }

          # Temp-Verzeichnis für .deb Dateien
          if (-not (Test-Path temp)) { New-Item -ItemType Directory -Force -Path temp | Out-Null }

          Copy-Item "$env:CACHE_ROOT\*.deb" temp -Force -ErrorAction SilentlyContinue

          if (-not (Get-ChildItem temp -Filter *.deb)) {
            Write-Error "No .deb files found"
            exit 1
          }

      # ------------------------------------------------------------
      # Build Test Image
      # ------------------------------------------------------------
      - name: Build octo-test-base
        shell: powershell
        run: |
          docker build `
            --no-cache `
            --pull `
            -f ".github/docker/Dockerfile.octo-test" `
            -t "octo-test-base" `
            .
