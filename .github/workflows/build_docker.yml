name: Build Docker Test Image
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      run_id:
        required: true
        type: string

jobs:
  build-docker:
    name: Build Docker Test Image
    runs-on: [self-hosted, windows, x64, octo]
    env:
      LOCAL_DEB_CACHE: C:\octo\artefacts\${{ inputs.run_id || github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker build context
        shell: powershell
        run: |
          if (-not (Test-Path $env:LOCAL_DEB_CACHE)) {
            Write-Error "Cache not found: $env:LOCAL_DEB_CACHE"
            exit 1
          }
          
          # Temp-Verzeichnis für .deb Dateien
          if (-not (Test-Path temp)) { 
            New-Item -ItemType Directory -Force -Path temp | Out-Null 
          }
          
          Copy-Item "$env:LOCAL_DEB_CACHE\*.deb" temp -Force -ErrorAction SilentlyContinue
          
          if (-not (Get-ChildItem temp -Filter *.deb)) {
            Write-Error "No .deb files found in $env:LOCAL_DEB_CACHE"
            exit 1
          }
          
          Write-Host "Copied debs:"
          Get-ChildItem temp -Filter *.deb

      - name: Build octo-test-base
        shell: powershell
        run: |
          docker build `
            --no-cache `
            --pull `
            -f ".github/docker/Dockerfile.octo-test" `
            -t "octo-test-base" `
            .