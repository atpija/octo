name: Minimal Octo Docker Smoketest

on:
  workflow_dispatch:

jobs:
  smoketest:
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy .deb files from temp
        shell: powershell
        run: |
          $tempPath = "${{ runner.workspace }}/temp"
          if (-not (Test-Path $tempPath)) {
            Write-Error "Temp folder not found: $tempPath"
            exit 1
          }

          $debFiles = Get-ChildItem -Path $tempPath -Filter *.deb
          if (-not $debFiles) {
            Write-Error "No .deb files found in temp folder!"
            exit 1
          }

          Copy-Item $tempPath\*.deb . -Force

      - name: Build Docker image
        shell: powershell
        run: |
          docker build `
            -f ".github/docker/Dockerfile.octo-test" `
            -t octo-test:latest `
            .

      - name: Run smoketest inside container
        shell: powershell
        run: |
          cd test
          octo run smoketest.sh
