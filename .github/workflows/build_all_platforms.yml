name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen?'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows
          - linux

env:
  OCTO_TOKEN: demo-token
  OCTO_SERVER: http://127.0.0.1:5000

# ============================================================
# WINDOWS BUILD
# ============================================================
jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows components
        shell: powershell
        run: |
          $components = @("client","server","runner")
          foreach ($c in $components) {
            cd $c
            ./build_installer.ps1
            if ($LASTEXITCODE -ne 0) { exit 1 }
            cd ..
          }

# ============================================================
# LINUX BUILD (Octo parallel)
# ============================================================
  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]

    env:
      CACHE_ROOT: C:\octo\runner-cache\linux\${{ github.repository }}\${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Octo login
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11

      - name: Build Linux packages in parallel
        shell: powershell
        run: |
          $root = Get-Location
          $jobs = @()

          foreach ($c in @("client","server","runner")) {
            $jobs += Start-Process powershell `
              -ArgumentList "-Command cd `"$root/$c`"; octo run ./start_build.sh" `
              -PassThru
          }

          $jobs | Wait-Process

      - name: Collect .deb files
        shell: powershell
        run: |
          New-Item docker_debs -ItemType Directory -Force | Out-Null
          Get-ChildItem -Recurse -Filter *.deb | Copy-Item -Destination docker_debs

      - name: Cache .deb files locally
        shell: powershell
        run: |
          New-Item $env:CACHE_ROOT -ItemType Directory -Force | Out-Null
          Copy-Item docker_debs\*.deb $env:CACHE_ROOT -Force

# ============================================================
# DOCKER IMAGE BUILD (INFRA + TEST BASE PARALLEL)
# ============================================================
  build-docker:
    name: Build Docker Images
    uses: ./.github/workflows/build_docker.yml
    needs: build-linux
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

# ============================================================
# START DOCKER INFRA (SERVER + RUNNER)
# ============================================================
  docker-infra-up:
    name: Start Octo Infra (Docker)
    runs-on: [self-hosted, windows, x64, octo]
    needs: build-docker
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

    steps:
      - name: Start Infra container
        shell: powershell
        run: |
          docker rm -f octo-infra 2>$null
          docker run -d `
            --name octo-infra `
            -p 5000:5000 `
            octo-infra

# ============================================================
# SMOKETEST (OCTO ORCHESTRATED)
# ============================================================
  smoketest:
    name: Run Smoketest
    runs-on: [self-hosted, windows, x64, octo]
    needs: docker-infra-up
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

    steps:
      - uses: actions/checkout@v4

      - name: Octo login
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER

      - name: Run pytest smoketest
        shell: powershell
        run: |
          octo config --docker octo-test-base
          octo run smoketest.py

# ============================================================
# CLEANUP
# ============================================================
  cleanup:
    name: Cleanup
    runs-on: [self-hosted, windows, x64, octo]
    needs:
      - build-windows
      - build-linux
      - smoketest
    if: always()

    steps:
      - name: Stop Docker Infra
        shell: powershell
        run: |
          docker rm -f octo-infra 2>$null

      - name: Cleanup old runner cache
        shell: powershell
        run: |
          $base = "C:\octo\runner-cache\linux"
          if (Test-Path $base) {
            Get-ChildItem $base -Directory |
              Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-14) } |
              Remove-Item -Recurse -Force
          }
