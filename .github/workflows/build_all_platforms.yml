name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen?'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows
          - linux

env:
  OCTO_TOKEN: demo-token
  OCTO_SERVER: http://127.0.0.1:5000
  # Zentraler Build-Cache auf dem Runner
  BUILD_CACHE_ROOT: C:\octo\build-cache\${{ github.run_id }}

# ============================================================
# WINDOWS BUILD
# ============================================================
jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows components
        shell: powershell
        run: |
          # Build-Cache Verzeichnis erstellen
          $cacheDir = "$env:BUILD_CACHE_ROOT\windows"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          
          $components = @("client","server","runner")
          foreach ($c in $components) {
            cd $c
            ./build_installer.ps1
            if ($LASTEXITCODE -ne 0) { exit 1 }
            
            # Installationsdateien in Cache kopieren
            Get-ChildItem -Filter *.exe,*.msi -Recurse | ForEach-Object {
              Copy-Item $_.FullName $cacheDir -Force
              Write-Host "✅ Cached: $($_.Name)"
            }
            
            cd ..
          }
          
          Write-Host ""
          Write-Host "[BUILD CACHE] Windows builds cached in: $cacheDir"
          Get-ChildItem $cacheDir

# ============================================================
# LINUX BUILD (Octo parallel)
# ============================================================
  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]

    env:
      CACHE_ROOT: C:\octo\runner-cache\linux\${{ github.repository }}\${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Octo login
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11

      - name: Build Linux packages in parallel
        shell: powershell
        run: |
          $root = Get-Location
          $jobs = @()

          foreach ($c in @("client","server","runner")) {
            $jobs += Start-Process powershell `
              -ArgumentList "-Command cd `"$root/$c`"; octo run ./start_build.sh" `
              -PassThru
          }

          $jobs | Wait-Process

      - name: Collect .deb files into build cache
        shell: powershell
        run: |
          # Build-Cache Verzeichnis erstellen
          $cacheDir = "$env:BUILD_CACHE_ROOT\linux"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          
          Write-Host "Collecting .deb files..."

          $debFiles = Get-ChildItem -Recurse -Filter *.deb

          if (-not $debFiles) {
              Write-Error "No .deb files found!"
              exit 1
          }

          foreach ($file in $debFiles) {
              Copy-Item $file.FullName $cacheDir -Force
              Write-Host "✅ Cached: $($file.Name)"
          }

          Write-Host ""
          Write-Host "[BUILD CACHE] Linux builds cached in: $cacheDir"
          Get-ChildItem $cacheDir

# ============================================================
# DOCKER IMAGE BUILD (INFRA + TEST BASE PARALLEL)
# ============================================================
  build-docker:
    name: Build Docker Images
    needs: build-linux
    runs-on: [self-hosted, windows, x64, octo]
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Restore .deb files from cache
        shell: powershell
        run: |
          $cacheDir = "$env:BUILD_CACHE_ROOT\linux"
          
          if (-not (Test-Path $cacheDir)) {
            Write-Error "Cache directory not found: $cacheDir"
            exit 1
          }
          
          # Erstelle docker_debs für Docker Build
          New-Item -ItemType Directory -Force -Path docker_debs | Out-Null
          
          Copy-Item "$cacheDir\*.deb" docker_debs -Force
          
          Write-Host "[BUILD CACHE] Restored .deb files:"
          Get-ChildItem docker_debs
      
      - name: Build Docker Images
        shell: powershell
        run: |
          # Dein Docker Build Script hier
          # Zum Beispiel:
          docker build -t octo-infra -f docker/Dockerfile.infra .
          docker build -t octo-test-base -f docker/Dockerfile.test .

# ============================================================
# SETUP WSL INSTALL NEW OCTO RUNNER + SERVER
# ============================================================
  wsl-infra-up:
    name: Install Octo Server + Runner in WSL
    needs: build-linux
    runs-on: [self-hosted, windows, x64, octo]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore .deb files from cache
        shell: powershell
        run: |
          $cacheDir = "$env:BUILD_CACHE_ROOT\linux"
          
          if (-not (Test-Path $cacheDir)) {
            Write-Error "Cache directory not found: $cacheDir"
            exit 1
          }
          
          Write-Host "[BUILD CACHE] Available .deb files in cache:"
          Get-ChildItem $cacheDir
      
      - name: Install Octo in WSL
        shell: powershell
        run: |
          # Nutze den Cache-Pfad statt workspace
          $cacheDir = "$env:BUILD_CACHE_ROOT\linux"
          
          # Windows → WSL Pfad umwandeln
          $deb = $cacheDir -replace '\\','/'
          $deb = $deb -replace '^C:', '/mnt/c'
          Write-Host "WSL deb dir: $deb"
          
          wsl bash -c @"
          set -e
          cd /mnt/c/actions-runner/_work/octo/octo
          
          echo '🔧 Converting line endings...'
          find scripts -type f -name '*.sh' -exec sed -i 's/\r$$//' {} \; 2>/dev/null || true
          
          echo '🔧 Making scripts executable...'
          chmod +x scripts/install-octo.sh
          
          echo '🔧 Running installation...'
          ./scripts/install-octo.sh $deb
          "@

# ============================================================
# SMOKETEST (OCTO ORCHESTRATED)
# ============================================================
  smoketest:
    name: Run Smoketest
    runs-on: [self-hosted, windows, x64, octo]
    needs: wsl-infra-up
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run pytest smoketest
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker octo-test-base
          cd test
          octo run smoketest.py

# ============================================================
# CLEANUP
# ============================================================
  cleanup:
    name: Cleanup
    runs-on: [self-hosted, windows, x64, octo]
    needs:
      - build-windows
      - build-linux
      - smoketest
    if: always()

    steps:
      - name: Cleanup build cache for this run
        shell: powershell
        run: |
          # Cleanup des aktuellen Build-Cache
          $currentCache = "$env:BUILD_CACHE_ROOT"
          if (Test-Path $currentCache) {
            Write-Host "[CLEANUP] Cleaning up build cache: $currentCache"
            Remove-Item $currentCache -Recurse -Force
          }
      
      - name: Cleanup old runner cache
        shell: powershell
        run: |
          # Cleanup alter Runner-Caches
          $base = "C:\octo\runner-cache\linux"
          if (Test-Path $base) {
            Get-ChildItem $base -Directory |
              Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-14) } |
              Remove-Item -Recurse -Force
          }
          
          # Cleanup alter Build-Caches (älter als 7 Tage)
          $buildBase = "C:\octo\build-cache"
          if (Test-Path $buildBase) {
            Get-ChildItem $buildBase -Directory |
              Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-7) } |
              ForEach-Object {
                Write-Host "[CLEANUP] Removing old build cache: $($_.Name)"
                Remove-Item $_.FullName -Recurse -Force
              }
          }