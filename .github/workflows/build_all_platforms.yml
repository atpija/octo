name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen? windows/linux/all'
        required: false
        default: 'all'

env:
  OCTO_TOKEN: token1
  OCTO_SERVER: http://127.0.0.1:5000

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all Windows components
        shell: powershell
        run: |
          $components = @("client","server","runner")

          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Windows"
            Write-Host "=============================="

            $path = "octo\$comp"
            if (-not (Test-Path $path)) { Write-Error "$path not found!"; exit 1 }
            Set-Location $path

            if (-not (Test-Path "build_installer.ps1")) { Write-Error "build_installer.ps1 not found"; exit 1 }

            Write-Host "Running build_installer.ps1 for $comp..."
            & ".\build_installer.ps1"
            if ($LASTEXITCODE -ne 0) { Write-Error "$comp build failed!"; exit 1 }

            Set-Location ../..
          }

      - name: Package Windows installers
        shell: powershell
        run: |
          $installerFiles = Get-ChildItem -Recurse -Include "setup.exe" | Where-Object { $_.FullName -match "octo\\(client|server|runner)" }
          if ($installerFiles.Count -eq 0) { Write-Error "No Windows installers found!"; exit 1 }

          Write-Host "Found Windows installers:"
          $installerFiles | ForEach-Object { Write-Host $_.FullName }

          Compress-Archive -Path $installerFiles.FullName -DestinationPath "octo-windows.zip" -Force

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-windows
          path: octo-windows.zip
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Octo login
        shell: powershell
        run: |
          chcp 65001 > $null
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER

      - name: Configure Linux Docker
        shell: powershell
        run: octo config --docker python:3.11-slim

      - name: Build all Linux components
        shell: powershell
        run: |
          $components = @("client","server","runner")

          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Linux"
            Write-Host "=============================="

            $path = "octo\$comp"
            if (-not (Test-Path $path)) { Write-Error "$path not found!"; exit 1 }
            Set-Location $path

            if (-not (Test-Path "build_installer.sh")) { Write-Error "build_installer.sh not found"; exit 1 }

            Write-Host "Running build_installer.sh for $comp..."
            octo run build_installer.sh
            if ($LASTEXITCODE -ne 0) { Write-Error "$comp build failed!"; exit 1 }

            Set-Location ../..
          }

      - name: Package Linux installers
        shell: powershell
        run: |
          $debFiles = Get-ChildItem -Recurse -Include "*.deb" | Where-Object { $_.FullName -match "octo\\(client|server|runner)" }
          if ($debFiles.Count -eq 0) { Write-Error "No Linux .deb files found!"; exit 1 }

          Write-Host "Found Linux installers:"
          $debFiles | ForEach-Object { Write-Host $_.FullName }

          Compress-Archive -Path $debFiles.FullName -DestinationPath "octo-linux.zip" -Force

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-linux
          path: octo-linux.zip
          retention-days: 30
