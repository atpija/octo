name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen? windows/linux/all'
        required: false
        default: 'all'

env:
  OCTO_TOKEN: token1
  OCTO_SERVER: http://127.0.0.1:5000

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Show directory structure
        shell: powershell
        run: |
          Write-Host "== Directory structure =="
          Get-ChildItem -Recurse -Depth 2 | Select-Object FullName

      - name: Create dist directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "dist_windows" | Out-Null

      - name: Build Components (Windows)
        shell: powershell
        run: |
          $components = @("client","server","runner")

          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Windows"
            Write-Host "=============================="

            $path = if (Test-Path "octo\$comp") { "octo\$comp" } elseif (Test-Path $comp) { $comp } else {
              Write-Error "$comp folder not found!"
              exit 1
            }

            Set-Location $path

            if (-not (Test-Path "build_installer.ps1")) {
              Write-Error "build_installer.ps1 not found in $(Get-Location)!"
              exit 1
            }

            & ".\build_installer.ps1"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "$comp build failed!"
              exit 1
            }

            $destPath = "..\..\dist_windows\$comp"
            New-Item -ItemType Directory -Force -Path $destPath | Out-Null

            if (Test-Path "dist") {
              Copy-Item -Recurse "dist\*" $destPath -Force
            } else {
              Write-Warning "dist folder not found for $comp – checking current directory for artifacts..."
              $files = Get-ChildItem -Include *.exe,*.msi -Recurse -ErrorAction SilentlyContinue
              if ($files.Count -eq 0) {
                Write-Error "No output files found for $comp!"
                exit 1
              }
              foreach ($f in $files) { Copy-Item $f.FullName $destPath -Force }
            }

            Write-Host "✅ Copied outputs to $destPath"
            Set-Location ..\..
          }

      - name: Create Windows ZIP
        shell: powershell
        run: Compress-Archive -Path "dist_windows\*" -DestinationPath "octo-windows.zip" -Force

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-windows
          path: octo-windows.zip
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Show directory structure
        shell: powershell
        run: |
          Write-Host "== Directory structure =="
          Get-ChildItem -Recurse -Depth 2 | Select-Object FullName

      - name: Octo login & configure
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11-slim

      - name: Create dist directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "dist_linux" | Out-Null

      - name: Build Components (Linux)
        shell: powershell
        run: |
          $components = @("client","server","runner")

          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Linux"
            Write-Host "=============================="

            $path = if (Test-Path "octo\$comp") { "octo\$comp" } elseif (Test-Path $comp) { $comp } else {
              Write-Error "$comp folder not found!"
              exit 1
            }

            Set-Location $path

            if (-not (Test-Path "build_installer.sh")) {
              Write-Error "build_installer.sh not found in $(Get-Location)!"
              exit 1
            }

            octo run build_installer.sh

            if ($LASTEXITCODE -ne 0) {
              Write-Error "$comp build failed!"
              exit 1
            }

            $destPath = "..\..\dist_linux\$comp"
            New-Item -ItemType Directory -Force -Path $destPath | Out-Null

            if (Test-Path "dist") {
              Copy-Item -Recurse "dist\*" $destPath -Force
            } elseif (Test-Path "..\..\_work\octo\octo\dist_linux\$comp") {
              Write-Host "Found build output under _work/octo/dist_linux/$comp"
              Copy-Item -Recurse "..\..\_work\octo\octo\dist_linux\$comp\*" $destPath -Force
            } else {
              Write-Warning "No dist/ folder found – searching for .deb/.rpm/.tar.gz..."
              $files = Get-ChildItem -Include *.deb,*.rpm,*.tar.gz -Recurse -ErrorAction SilentlyContinue
              if ($files.Count -eq 0) {
                Write-Error "No Linux installer found for $comp!"
                exit 1
              }
              foreach ($f in $files) { Copy-Item $f.FullName $destPath -Force }
            }

            Write-Host "✅ Copied outputs to $destPath"
            Set-Location ..\..
          }

      - name: Create Linux ZIP
        shell: powershell
        run: Compress-Archive -Path "dist_linux\*" -DestinationPath "octo-linux.zip" -Force

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-linux
          path: octo-linux.zip
          retention-days: 30
