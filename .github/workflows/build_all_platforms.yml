name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen? windows/linux/all'
        required: false
        default: 'all'

env:
  OCTO_TOKEN: token1
  OCTO_SERVER: http://127.0.0.1:5000

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove old Windows ZIP
        shell: powershell
        run: |
          if (Test-Path "octo-windows.zip") { Remove-Item "octo-windows.zip" -Force }

      - name: Build all Windows components
        shell: powershell
        run: |
          $components = @("client","server","runner")
          foreach ($comp in $components) {
              Write-Host "=============================="
              Write-Host "Building $comp for Windows"
              Write-Host "=============================="

              $path = Join-Path $PWD "octo\$comp"
              if (-not (Test-Path $path)) { Write-Error "$path not found!"; exit 1 }
              Set-Location $path

              if (-not (Test-Path "build_installer.ps1")) { Write-Error "build_installer.ps1 not found"; exit 1 }

              Write-Host "Running build_installer.ps1 for $comp..."
              & ".\build_installer.ps1"
              if ($LASTEXITCODE -ne 0) { Write-Error "$comp build failed!"; exit 1 }

              Set-Location $PWD
          }

      - name: Package Windows installers
        shell: powershell
        run: |
          $expectedFiles = @(
            "octo\client\octo-client-0.1-setup.exe",
            "octo\runner\octo-runner-0.1-setup.exe",
            "octo\server\octo-server-0.1-setup.exe"
          )

          foreach ($file in $expectedFiles) {
            if (-not (Test-Path $file)) { Write-Error "Expected file $file not found!"; exit 1 }
          }

          Compress-Archive -Path $expectedFiles -DestinationPath "octo-windows.zip" -Force
          Write-Host "Windows ZIP created with exact installer files."

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-windows
          path: octo-windows.zip
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove old Linux ZIP
        shell: powershell
        run: |
          if (Test-Path "octo-linux.zip") { Remove-Item "octo-linux.zip" -Force }

      - name: Octo login
        shell: powershell
        run: |
          chcp 65001 > $null
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER

      - name: Configure Linux Docker
        shell: powershell
        run: octo config --docker python:3.11-slim

      - name: Build all Linux components
        shell: powershell
        run: |
          $components = @("client","server","runner")
          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Linux"
            Write-Host "=============================="

            $path = Join-Path $PWD "octo\$comp"
            if (-not (Test-Path $path)) { Write-Error "$path not found!"; exit 1 }
            Set-Location $path

            if (-not (Test-Path "build_installer.sh")) { Write-Error "build_installer.sh not found"; exit 1 }

            Write-Host "Running build_installer.sh for $comp..."
            octo run build_installer.sh
            if ($LASTEXITCODE -ne 0) { Write-Error "$comp build failed!"; exit 1 }

            Set-Location $PWD
          }

      - name: Package Linux installers
        shell: powershell
        run: |
          $expectedFiles = @(
            "octo\client\octo-client_0.1_amd64.deb",
            "octo\runner\octo-runner_0.1_amd64.deb",
            "octo\server\octo-server_0.1_amd64.deb"
          )

          foreach ($file in $expectedFiles) {
            if (-not (Test-Path $file)) { Write-Error "Expected file $file not found!"; exit 1 }
          }

          Compress-Archive -Path $expectedFiles -DestinationPath "octo-linux.zip" -Force
          Write-Host "Linux ZIP created with exact .deb files."

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-linux
          path: octo-linux.zip
          retention-days: 30
