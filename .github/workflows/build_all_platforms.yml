name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen? windows/linux/all'
        required: false
        default: 'all'

env:
  OCTO_TOKEN: token1
  OCTO_SERVER: http://127.0.0.1:5000

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Show directory structure
        shell: powershell
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Get-ChildItem -Recurse -Depth 2 | Select-Object FullName

      - name: Create dist directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "dist_windows" | Out-Null

      - name: Build all Windows components
        shell: powershell
        run: |
          $components = @("client","server","runner")

          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Windows"
            Write-Host "=============================="

            if (Test-Path "octo\$comp") {
              Set-Location "octo\$comp"
            } elseif (Test-Path $comp) {
              Set-Location $comp
            } else {
              Write-Error "$comp folder not found!"
              exit 1
            }

            if (-not (Test-Path "build_installer.ps1")) {
              Write-Error "build_installer.ps1 not found in $(Get-Location)!"
              exit 1
            }

            Write-Host "Building $comp in $(Get-Location)"
            & ".\build_installer.ps1"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "$comp build failed!"
              exit 1
            }

            $destPath = "..\..\dist_windows\$comp"
            New-Item -ItemType Directory -Force -Path $destPath | Out-Null

            if (Test-Path "dist") {
              Copy-Item -Recurse "dist\*" $destPath -Force
            } else {
              Write-Warning "No dist folder found for $comp!"
            }

            Set-Location ..\..
          }

      - name: Create Windows ZIP
        shell: powershell
        run: Compress-Archive -Path "dist_windows\*" -DestinationPath "octo-windows.zip" -Force

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-windows
          path: octo-windows.zip
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]  # Same runner, using Docker for Linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Show directory structure
        shell: powershell
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Get-ChildItem -Recurse -Depth 2 | Select-Object FullName

      - name: Octo login
        shell: powershell
        run: |
          chcp 65001 > $null
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER

      - name: Configure Linux Docker
        shell: powershell
        run: octo config --docker python:3.11-slim

      - name: Create dist directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "dist_linux" | Out-Null

      - name: Build all Linux components
        shell: powershell
        run: |
          $components = @("client","server","runner")

          foreach ($comp in $components) {
            Write-Host "=============================="
            Write-Host "Building $comp for Linux"
            Write-Host "=============================="

            if (Test-Path "octo\$comp") {
              Set-Location "octo\$comp"
            } elseif (Test-Path $comp) {
              Set-Location $comp
            } else {
              Write-Error "$comp folder not found!"
              exit 1
            }

            if (-not (Test-Path "build_installer.sh")) {
              Write-Error "build_installer.sh not found in $(Get-Location)!"
              exit 1
            }

            Write-Host "Building $comp (Linux) in $(Get-Location)"
            octo run build_installer.sh

            if ($LASTEXITCODE -ne 0) {
              Write-Error "$comp build failed!"
              exit 1
            }

            $destPath = "..\..\dist_linux\$comp"
            New-Item -ItemType Directory -Force -Path $destPath | Out-Null

            if (Test-Path "dist") {
              Copy-Item -Recurse "dist\*" $destPath -Force
            } else {
              $installers = Get-ChildItem -File -Include *.deb,*.rpm,*.tar.gz -Recurse -ErrorAction SilentlyContinue
              if ($installers.Count -eq 0) {
                Write-Error "No installers found after $comp build!"
                exit 1
              }
              foreach ($file in $installers) {
                Copy-Item $file.FullName $destPath -Force
              }
            }

            Set-Location ..\..
          }

      - name: Create Linux ZIP
        shell: powershell
        run: Compress-Archive -Path "dist_linux\*" -DestinationPath "octo-linux.zip" -Force

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-linux
          path: octo-linux.zip
          retention-days: 30
