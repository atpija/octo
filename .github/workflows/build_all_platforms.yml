name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen?'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows
          - linux

env:
  OCTO_TOKEN: demo-token
  OCTO_SERVER: http://127.0.0.1:5000

# ============================================================
# WINDOWS BUILD
# ============================================================
jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows components
        shell: powershell
        run: |
          $components = @("client","server","runner")
          foreach ($c in $components) {
            cd $c
            ./build_installer.ps1
            if ($LASTEXITCODE -ne 0) { exit 1 }
            cd ..
          }

# ============================================================
# LINUX BUILD (Octo parallel)
# ============================================================
  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers
    runs-on: [self-hosted, windows, x64, octo]

    env:
      CACHE_ROOT: C:\octo\runner-cache\linux\${{ github.repository }}\${{ github.ref_name }}
      LOCAL_DEB_CACHE: C:\octo\artefacts\${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Octo login
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11

      - name: Build Linux packages in parallel
        shell: powershell
        run: |
          $root = Get-Location
          $jobs = @()

          foreach ($c in @("client","server","runner")) {
            $jobs += Start-Process powershell `
              -ArgumentList "-Command cd `"$root/$c`"; octo run ./start_build.sh" `
              -PassThru
          }

          $jobs | Wait-Process

      - name: Collect .deb files into docker_debs/
        shell: powershell
        run: |
          Write-Host "Collecting .deb files..."

          if (Test-Path docker_debs) {
              Remove-Item docker_debs -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path docker_debs | Out-Null

          $debFiles = Get-ChildItem -Recurse -Filter *.deb |
            Where-Object { $_.FullName -notmatch '\\docker_debs\\' }

          if (-not $debFiles) {
              Write-Error "No .deb files found!"
              exit 1
          }

          foreach ($file in $debFiles) {
              Copy-Item $file.FullName docker_debs -Force
          }

          Get-ChildItem docker_debs

      # ------------------------------------------------------------
      # LOCAL ARTEFACT CACHE (NEW)
      # ------------------------------------------------------------
      - name: Cache .deb files locally
        shell: powershell
        run: |
          Write-Host "Caching debs to $env:LOCAL_DEB_CACHE"

          if (Test-Path $env:LOCAL_DEB_CACHE) {
            Remove-Item $env:LOCAL_DEB_CACHE -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $env:LOCAL_DEB_CACHE | Out-Null
          Copy-Item docker_debs\*.deb $env:LOCAL_DEB_CACHE -Force

          Write-Host "Cached debs:"
          Get-ChildItem $env:LOCAL_DEB_CACHE

# ============================================================
# DOCKER IMAGE BUILD (INFRA + TEST BASE PARALLEL)
# ============================================================
  build-docker:
    name: Build Docker Images
    uses: ./.github/workflows/build_docker.yml
    needs: build-linux
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

# ============================================================
# SETUP WSL INSTALL NEW OCTO RUNNER + SERVER
# ============================================================
  wsl-infra-up:
    name: Install Octo Server + Runner in WSL
    needs: build-linux
    runs-on: [self-hosted, windows, x64, octo]

    env:
      DEB_DIR_WIN: C:\octo\artefacts\${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Octo in WSL
        shell: powershell
        run: |
          $deb = $env:DEB_DIR_WIN -replace '\\','/'
          $deb = $deb -replace '^C:', '/mnt/c'
          Write-Host "WSL deb dir: $deb"

          wsl bash scripts/install-wsl-octo.sh "$deb"

      - name: Verify Octo installation in WSL
        shell: powershell
        run: |
          wsl bash -lc "echo 'WSL OK'; which octo-server; which octo-runner; octo-server --help"

# ============================================================
# Tests (PARALLEL, OCTO ORCHESTRATED)
# ============================================================
  testset:
    name: Run Octo Test Set (parallel)
    runs-on: [self-hosted, windows, x64, octo]
    needs:
      - wsl-infra-up
      - build-docker
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Octo
        shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker octo-test-base
      
      - name: Run tests in parallel via Octo
        shell: powershell
        run: |
          $root = Get-Location
          $tests = @("smoketest.py", "test_daily.py")  # später beliebig erweitern
          $jobs = @()
          $logfiles = @{}
          
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Starting $($tests.Count) tests in parallel" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          
          foreach ($test in $tests) {
            $logfile = "$env:TEMP\octo-test-$test-$((Get-Date).Ticks).log"
            $logfiles[$test] = $logfile
            
            $job = Start-Process powershell `
              -ArgumentList "-Command `$ErrorActionPreference='Continue'; cd '$root/test'; octo run $test *>&1 | Tee-Object -FilePath '$logfile'" `
              -PassThru `
              -NoNewWindow
            
            $jobs += $job
            Write-Host "✓ Started $test (PID: $($job.Id))" -ForegroundColor Green
          }
          
          Write-Host "`n⏳ Waiting for all tests to complete...`n" -ForegroundColor Yellow
          
          # Monitoring während Tests laufen
          $completed = @()
          while ($jobs | Where-Object { -not $_.HasExited }) {
            Start-Sleep -Seconds 2
            foreach ($job in $jobs) {
              if ($job.HasExited -and $job.Id -notin $completed) {
                $testName = $tests[$jobs.IndexOf($job)]
                $status = if ($job.ExitCode -eq 0) { "✅ PASSED" } else { "❌ FAILED" }
                Write-Host "$status - $testName (Exit: $($job.ExitCode))" -ForegroundColor $(if ($job.ExitCode -eq 0) { "Green" } else { "Red" })
                $completed += $job.Id
              }
            }
          }
          
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Test Results" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          
          # Logs und Ergebnisse ausgeben
          $failedTests = @()
          foreach ($test in $tests) {
            $job = $jobs[$tests.IndexOf($test)]
            $logfile = $logfiles[$test]
            
            Write-Host "`n" + ("=" * 60) -ForegroundColor Cyan
            Write-Host "  $test" -ForegroundColor Cyan
            Write-Host ("=" * 60) -ForegroundColor Cyan
            
            if (Test-Path $logfile) {
              Get-Content $logfile | Write-Host
            } else {
              Write-Host "⚠️  Log file not found: $logfile" -ForegroundColor Yellow
            }
            
            if ($job.ExitCode -ne 0) {
              $failedTests += $test
              Write-Host "`n❌ $test FAILED (Exit Code: $($job.ExitCode))" -ForegroundColor Red
            } else {
              Write-Host "`n✅ $test PASSED" -ForegroundColor Green
            }
          }
          
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Summary" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Total tests: $($tests.Count)" -ForegroundColor White
          Write-Host "Passed: $($tests.Count - $failedTests.Count)" -ForegroundColor Green
          Write-Host "Failed: $($failedTests.Count)" -ForegroundColor Red
          
          if ($failedTests.Count -gt 0) {
            Write-Host "`n❌ Failed tests:" -ForegroundColor Red
            $failedTests | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
            exit 1
          }
          
          Write-Host "`n✅ All tests passed!" -ForegroundColor Green

# ============================================================
# CLEANUP
# ============================================================
  cleanup:
    name: Cleanup
    runs-on: [self-hosted, windows, x64, octo]
    needs:
      - build-windows
      - build-linux
      - testset
    if: always()

    steps:
      - name: Cleanup old runner cache
        shell: powershell
        run: |
          $base = "C:\octo\runner-cache\linux"
          if (Test-Path $base) {
            Get-ChildItem $base -Directory |
              Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-14) } |
              Remove-Item -Recurse -Force
          }
