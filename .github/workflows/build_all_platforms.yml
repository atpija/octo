name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen? windows/linux/all'
        required: false
        default: 'all'

env:
  OCTO_TOKEN: token1
  OCTO_SERVER: http://127.0.0.1:5000

jobs:
  # =========================
  # WINDOWS BUILDS (parallel)
  # =========================
  build-windows-client:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Client
    runs-on: [self-hosted, windows, x64, octo]
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          Set-Location client
          & ".\build_installer.ps1"

  build-windows-server:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Server
    runs-on: [self-hosted, windows, x64, octo]
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          Set-Location server
          & ".\build_installer.ps1"

  build-windows-runner:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Runner
    runs-on: [self-hosted, windows, x64, octo]
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          Set-Location runner
          & ".\build_installer.ps1"

  package-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Package Windows Installers
    runs-on: [self-hosted, windows, x64, octo]
    needs: [build-windows-client, build-windows-server, build-windows-runner]
    steps:
      - uses: actions/checkout@v4
      - name: Collect installers and zip
        shell: powershell
        run: |
          $installerFiles = @(
            "client/octo-client-0.1-setup.exe",
            "server/octo-server-0.1-setup.exe",
            "runner/octo-runner-0.1-setup.exe"
          )
          Compress-Archive -Path $installerFiles -DestinationPath "octo-windows.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: octo-windows
          path: octo-windows.zip
          retention-days: 30

  # =========================
  # LINUX BUILDS (parallel)
  # =========================
  build-linux-client:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Client
    runs-on: [self-hosted, windows, x64, octo]
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11
          Set-Location client
          octo run ./start_build.sh

  build-linux-server:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Server
    runs-on: [self-hosted, windows, x64, octo]
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11
          Set-Location server
          octo run ./start_build.sh

  build-linux-runner:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Runner
    runs-on: [self-hosted, windows, x64, octo]
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11
          Set-Location runner
          octo run ./start_build.sh

  package-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Package Linux Installers
    runs-on: [self-hosted, windows, x64, octo]
    needs: [build-linux-client, build-linux-server, build-linux-runner]
    steps:
      - uses: actions/checkout@v4
      - name: Collect .deb files and zip
        shell: powershell
        run: |
          $installerFiles = @(
            "client/octo-client_0.1_amd64.deb",
            "server/octo-server_0.1_amd64.deb",
            "runner/octo-runner_0.1_amd64.deb"
          )
          Compress-Archive -Path $installerFiles -DestinationPath "octo-linux.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: octo-linux
          path: octo-linux.zip
          retention-days: 30
