name: Build Octo Installers (Windows + Linux)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Welche Plattform bauen?'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows
          - linux

env:
  OCTO_TOKEN: token1
  OCTO_SERVER: http://127.0.0.1:5000

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    name: Build Windows Installers
    runs-on: [self-hosted, windows, x64, octo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove old Windows ZIP
        shell: powershell
        run: |
          if (Test-Path "octo-windows.zip") { Remove-Item "octo-windows.zip" -Force }

      - name: Build all Windows components
        shell: powershell
        run: |
          $components = @("client","server","runner")
          $rootPath = $PWD
          foreach ($comp in $components) {
              Write-Host "=============================="
              Write-Host "Building $comp for Windows"
              Write-Host "=============================="

              $path = Join-Path $rootPath $comp
              if (-not (Test-Path $path)) { Write-Error "$path not found!"; exit 1 }
              Set-Location $path

              if (-not (Test-Path "build_installer.ps1")) { Write-Error "build_installer.ps1 not found"; exit 1 }

              Write-Host "Running build_installer.ps1 for $comp..."
              & ".\build_installer.ps1"
              if ($LASTEXITCODE -ne 0) { Write-Error "$comp build failed!"; exit 1 }

              Set-Location $rootPath
          }

      - name: Package Windows installers
        shell: powershell
        run: |
          Write-Host "Current directory: $PWD"
          Write-Host "Listing all files in workspace:"
          Get-ChildItem -Recurse | ForEach-Object { Write-Host $_.FullName }

          $components = @("client","server","runner")
          $installerFiles = @()

          foreach ($comp in $components) {
              Write-Host "Looking for installer for component: $comp"
              $compPath = Join-Path $PWD $comp
              $installer = Join-Path $compPath "octo-$comp-0.1-setup.exe"
              Write-Host "Checking path: $installer"

              if (Test-Path $installer) {
                  Write-Host "Found installer at: $installer"
                  $installerFiles += $installer
              } else {
                  Write-Error "Expected installer not found: $installer"
                  exit 1
              }
          }

          Write-Host "Found installer files:"
          $installerFiles | ForEach-Object { Write-Host "- $_" }

          Compress-Archive -Path $installerFiles -DestinationPath "octo-windows.zip" -Force
          Write-Host "Windows ZIP created with exact installer files."

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: octo-windows
          path: octo-windows.zip
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    name: Build Linux Installers (parallel with Octo)
    runs-on: [self-hosted, windows, x64, octo]
    # Stable, shared cache path: repository + ref (branch/tag)
    env:
      CACHE_ROOT: C:\octo\runner-cache\linux\${{ github.repository }}\${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean old workspace artifacts
        shell: powershell
        run: |
          if (Test-Path "octo-linux.zip") { Remove-Item "octo-linux.zip" -Force }
          Remove-Item -Force -ErrorAction Ignore client_build.log, server_build.log, runner_build.log

      - name: Octo login & config
        shell: powershell
        run: |
          chcp 65001 > $null
          octo login --token $env:OCTO_TOKEN --server $env:OCTO_SERVER
          octo config --docker python:3.11

      - name: Run Linux builds in parallel (OS-level concurrency)
        shell: powershell
        run: |
          Write-Host "Starting parallel Octo Linux builds..."

          $root = Get-Location
          $jobs = @()

          # CLIENT
          $jobs += Start-Process powershell.exe -ArgumentList @(
            '-NoLogo','-NoProfile','-Command',
            "cd `"$root/client`"; echo 'Client build starting'; octo run ./start_build.sh | Tee-Object `"$root/client_build.log`""
          ) -PassThru

          # SERVER
          $jobs += Start-Process powershell.exe -ArgumentList @(
            '-NoLogo','-NoProfile','-Command',
            "cd `"$root/server`"; echo 'Server build starting'; octo run ./start_build.sh | Tee-Object `"$root/server_build.log`""
          ) -PassThru

          # RUNNER
          $jobs += Start-Process powershell.exe -ArgumentList @(
            '-NoLogo','-NoProfile','-Command',
            "cd `"$root/runner`"; echo 'Runner build starting'; octo run ./start_build.sh | Tee-Object `"$root/runner_build.log`""
          ) -PassThru

          Write-Host "Parallel tasks started, waiting for completion..."
          $jobs | Wait-Process
          Write-Host "All builds finished!"

      - name: Show Octo output logs
        shell: powershell
        run: |
          Write-Host "===== CLIENT LOG ====="
          Get-Content client_build.log
          Write-Host "===== SERVER LOG ====="
          Get-Content server_build.log
          Write-Host "===== RUNNER LOG ====="
          Get-Content runner_build.log

      - name: Collect .deb files into docker_debs/
        shell: powershell
        run: |
          Write-Host "Collecting .deb files..."

          $debFiles = Get-ChildItem -Recurse -Filter *.deb
          if (-not $debFiles) {
              Write-Error "No .deb files found!"
              exit 1
          }

          New-Item -ItemType Directory -Force -Path docker_debs | Out-Null

          foreach ($file in $debFiles) {
              Copy-Item $file.FullName docker_debs/
          }

          Write-Host "Copied the following .deb files into docker_debs/:"
          Get-ChildItem docker_debs

      - name: Package docker_debs folder
        shell: powershell
        run: |
          Write-Host "Packaging docker_debs/*.deb ..."

          if (-not (Test-Path "docker_debs")) {
              Write-Error "docker_debs directory missing!"
              exit 1
          }

          Compress-Archive -Path docker_debs/* -DestinationPath octo-linux.zip -Force

          Write-Host "Created octo-linux.zip successfully."

      - name: Store .deb files in local runner cache
        shell: powershell
        run: |
          Write-Host "Storing .deb files in local runner cache: $env:CACHE_ROOT"
          New-Item -ItemType Directory -Force -Path $env:CACHE_ROOT | Out-Null

          $debFiles = Get-ChildItem docker_debs -Filter *.deb -ErrorAction SilentlyContinue
          if (-not $debFiles) {
            Write-Error "No .deb files found in docker_debs to copy to cache!"
            exit 1
          }

          foreach ($f in $debFiles) {
            Copy-Item $f.FullName $env:CACHE_ROOT -Force
          }

          Write-Host "Cached files:"
          Get-ChildItem $env:CACHE_ROOT

      # Removed upload-artifact steps for linux to avoid GitHub storage quota usage

#      - name: Upload build logs
 #       uses: actions/upload-artifact@v4
  #      with:
   #       name: parallel-octo-logs
    #      path: |
     #       client_build.log
      #      server_build.log
       #     runner_build.log
        #  retention-days: 7

  build-and-test-docker:
    name: Build Docker Image & Run Smoketest
    uses: ./.github/workflows/build_docker.yml
    needs: build-linux
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    with:
      image_name: 'octo-test'
      dockerfile: '.github/docker/Dockerfile.octo-test'

  cleanup:
    name: Cleanup Artifacts
    runs-on: [self-hosted, windows, x64, octo]
    needs: [build-windows, build-linux, build-and-test-docker, run-smoketest]
    if: always()
    env:
      CACHE_BASE: C:\octo\runner-cache\linux

    steps:
      - name: Delete workspace .deb files
        shell: powershell
        run: |
          Write-Host "Cleaning up workspace .deb files..."
          Get-ChildItem -Filter *.deb -Force -ErrorAction Ignore | Remove-Item -Force
          Write-Host "✅ Workspace cleanup complete"

      - name: Cleanup local runner cache older than 14 days
        shell: powershell
        run: |
          $cacheBase = "${{ env.CACHE_BASE }}"
          if (-not (Test-Path $cacheBase)) {
            Write-Host "No runner-cache present at $cacheBase"
            exit 0
          }
          Write-Host "Cleaning cache directories older than 14 days under $cacheBase"
          Get-ChildItem $cacheBase -Directory -Force |
            Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-14) } |
            ForEach-Object {
              Write-Host "Removing cache: $($_.FullName)"
              Remove-Item $_.FullName -Recurse -Force
            }
          Write-Host "✅ Cache cleanup complete"
